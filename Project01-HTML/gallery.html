<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gallery | Portfolio</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#07132c;color:#e2e8f0;}
        header{background:#081737;border-bottom:2px solid #2f67ff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}

        nav a:hover{color:#93c5fd;}
        .gallery-hero{padding:40px 28px;text-align:center;}
        .gallery-hero h1{font-size:3rem;color:#fff;margin-bottom:12px;}
        .gallery-hero p{color:#cbd5e1;max-width:760px;margin:0 auto 24px;}
        .photos{display:flex;justify-content:center;gap:22px;overflow-x:auto;padding:20px;}
        .photo {flex:0 0 auto;width:320px;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.32);}
        .photo img{width:100%;display:block;border-radius:12px;}
        .photo-title{text-align:center;color:#cbd5e1;padding:10px 0;}
        footer{padding:20px 28px;text-align:center;font-size:.92rem;color:#94a3b8;border-top:1px solid #1c2b5a;}

</head>
<body>
    <header>
        <div class="brand">PORTFOLIO.</div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="blog.html">Blog</a></li><li><a href="contact.html">Contact</a></li></ul></nav>

        <div class="photo"><img src="./assets/VRcht-2026.png" alt="Another VRChat"><div class="photo-title">VRChat face</div></div>
