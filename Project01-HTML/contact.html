<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact | Portfolio</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#07132c;color:#e2e8f0;}
        header{background:#081737;border-bottom:2px solid #2f67ff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        .brand{font-size:1.6rem;font-weight:900;color:#5f90ff;}
        nav ul{list-style:none;display:flex;gap:16px;}
        nav a{text-decoration:none;color:#f8fafc;font-weight:600;}
        nav a:hover{color:#93c5fd;}
        .contact-hero{padding:40px 28px;text-align:center;}
        .contact-hero h1{font-size:3rem;color:#fff;margin-bottom:12px;}
        .contact-hero p{color:#cbd5e1;max-width:760px;margin:0 auto 24px;}
        .contact-container{max-width:800px;margin:0 auto;background:#0f1b3d;border:1px solid #2f4ed5;border-radius:14px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.35);}
        .contact-container h2{color:#93c5fd;margin-bottom:18px;}
        .field{margin-bottom:16px;}
        label{display:block;color:#cbd5e1;margin-bottom:8px;font-weight:600;}
        input,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #2f4ed5;background:#172944;color:#e2e8f0;}
        input:focus,textarea:focus{outline:none;border-color:#60a5fa;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;}
        button:hover{background:#2563eb;}
        footer{padding:20px 28px;text-align:center;font-size:.92rem;color:#94a3b8;border-top:1px solid #1c2b5a;}
    </style>
</head>
<body>
    <header>
        <div class="brand">PORTFOLIO.</div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="blog.html">Blog</a></li><li><a href="contact.html">Contact</a></li></ul></nav>
    </header>

    <section class="contact-hero">
        <h1>Contact</h1>
        <p>Let&#39;s build great experiences together. Use the contact form to send a message.</p>
    </section>

    <section class="contact-container">
        <h2>Get in touch</h2>
        <div class="field"><label for="name">Name</label><input type="text" id="name" name="name" placeholder="Your name" required></div>
        <div class="field"><label for="email">Email</label><input type="email" id="email" name="email" placeholder="you@example.com" required></div>
        <div class="field"><label for="message">Message</label><textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea></div>
        <button type="submit">Send Message</button>
    </section>

    <footer>&copy; 2026 Muhammad Taufik Akbar</footer>
</body>
</html>
